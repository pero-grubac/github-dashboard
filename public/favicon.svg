<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0c0e12"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5b8af5"/>
      <stop offset="100%" stop-color="#7c6cf5"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7c6cf5"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>
    <linearGradient id="dot" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5b8af5"/>
      <stop offset="100%" stop-color="#7c6cf5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" stroke="#2a2f40" stroke-width="1" fill="none"/>

  <!-- Bar chart bars -->
  <!-- Bar 1 (short) -->
  <rect x="5" y="20" width="4" height="7" rx="1.5" fill="url(#bar)" opacity="0.6"/>
  <!-- Bar 2 (medium) -->
  <rect x="11" y="15" width="4" height="12" rx="1.5" fill="url(#bar)"/>
  <!-- Bar 3 (tall) -->
  <rect x="17" y="10" width="4" height="17" rx="1.5" fill="url(#bar2)"/>
  <!-- Bar 4 (medium-short) -->
  <rect x="23" y="17" width="4" height="10" rx="1.5" fill="url(#bar)" opacity="0.8"/>

  <!-- Trend line dots -->
  <circle cx="7" cy="19" r="1.5" fill="url(#dot)" opacity="0.9"/>
  <circle cx="13" cy="14" r="1.5" fill="url(#dot)" opacity="0.9"/>
  <circle cx="19" cy="9" r="1.5" fill="url(#dot)"/>
  <circle cx="25" cy="16" r="1.5" fill="url(#dot)" opacity="0.9"/>

  <!-- Trend line segments -->
  <line x1="7" y1="19" x2="13" y2="14" stroke="#5b8af5" stroke-width="1" opacity="0.5"/>
  <line x1="13" y1="14" x2="19" y2="9" stroke="#7c6cf5" stroke-width="1" opacity="0.5"/>
  <line x1="19" y1="9" x2="25" y2="16" stroke="#5b8af5" stroke-width="1" opacity="0.5"/>

  <!-- Bottom baseline -->
  <line x1="4" y1="27.5" x2="28" y2="27.5" stroke="#2a2f40" stroke-width="0.75"/>
</svg>
